<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
    }
    .container {
      width: 1200px;
      height: 630px;
      position: relative;
      background: linear-gradient(135deg, #0EA5E9 0%, #3B82F6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .particles {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
    }
    .particle:nth-child(1) { width: 160px; height: 160px; top: 80px; left: 120px; }
    .particle:nth-child(2) { width: 120px; height: 120px; bottom: 80px; right: 120px; }
    .particle:nth-child(3) { width: 80px; height: 80px; top: 400px; left: 80px; }
    .particle:nth-child(4) { width: 100px; height: 100px; top: 100px; right: 100px; }

    .content-card {
      background: rgba(255, 255, 255, 0.98);
      border-radius: 32px;
      padding: 60px 80px;
      width: 1000px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      position: relative;
      z-index: 2;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 40px;
      margin-bottom: 40px;
    }
    .logo-circle {
      width: 140px;
      height: 140px;
      background: linear-gradient(135deg, #0EA5E9, #3B82F6);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 10px 25px rgba(14, 165, 233, 0.3);
    }
    .logo-text {
      font-size: 80px;
      font-weight: 800;
      color: white;
      line-height: 1;
    }
    .title-section {
      flex: 1;
    }
    .main-title {
      font-size: 64px;
      font-weight: 800;
      color: #1E293B;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 36px;
      font-weight: 600;
      color: #475569;
      line-height: 1.2;
    }
    .features {
      display: flex;
      flex-direction: column;
      gap: 28px;
      margin-top: 40px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .checkmark {
      width: 32px;
      height: 32px;
      background: #10B981;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .checkmark svg {
      width: 18px;
      height: 18px;
      stroke: white;
      stroke-width: 3;
      fill: none;
    }
    .feature-text {
      font-size: 28px;
      color: #64748B;
      font-weight: 600;
    }
    .badge {
      display: inline-block;
      background: linear-gradient(135deg, #F59E0B, #F97316);
      color: white;
      padding: 14px 36px;
      border-radius: 28px;
      font-size: 24px;
      font-weight: 700;
      margin-top: 35px;
      box-shadow: 0 8px 16px rgba(245, 158, 11, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="particles">
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
      <div class="particle"></div>
    </div>

    <div class="content-card">
      <div class="header">
        <div class="logo-circle">
          <div class="logo-text">Q</div>
        </div>
        <div class="title-section">
          <div class="main-title">QuantumFunZone</div>
          <div class="subtitle">Quantum Physics for Kids Ages 8-12</div>
        </div>
      </div>

      <div class="features">
        <div class="feature-item">
          <div class="checkmark">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div class="feature-text">Interactive Flashcards</div>
        </div>
        <div class="feature-item">
          <div class="checkmark">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div class="feature-text">Animated Videos</div>
        </div>
        <div class="feature-item">
          <div class="checkmark">
            <svg viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
          </div>
          <div class="feature-text">Fun Infographics & More</div>
        </div>
      </div>

      <div class="badge">FREE Resources</div>
    </div>
  </div>
</body>
</html>
