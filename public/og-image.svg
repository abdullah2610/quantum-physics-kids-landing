<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with Gradient -->
  <rect width="1200" height="630" fill="url(#paint0_linear)"/>
  <defs>
    <linearGradient id="paint0_linear" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- Atom/Quantum Particles Decorations -->
  <circle cx="200" cy="150" r="80" fill="rgba(255, 255, 255, 0.1)" />
  <circle cx="1000" cy="480" r="60" fill="rgba(255, 255, 255, 0.1)" />
  <circle cx="150" cy="500" r="40" fill="rgba(255, 255, 255, 0.15)" />
  <circle cx="1050" cy="150" r="50" fill="rgba(255, 255, 255, 0.1)" />

  <!-- Orbital paths -->
  <circle cx="200" cy="150" r="60" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  <circle cx="1000" cy="480" r="45" stroke="rgba(255, 255, 255, 0.3)" stroke-width="2" fill="none" stroke-dasharray="5,5"/>

  <!-- Small particles -->
  <circle cx="180" cy="90" r="8" fill="#FFF"/>
  <circle cx="220" cy="210" r="6" fill="#FFF"/>
  <circle cx="970" cy="440" r="7" fill="#FFF"/>
  <circle cx="1030" cy="520" r="5" fill="#FFF"/>

  <!-- Main Content Container -->
  <rect x="100" y="120" width="1000" height="390" rx="24" fill="rgba(255, 255, 255, 0.95)"/>

  <!-- Icon/Logo Area -->
  <circle cx="250" cy="250" r="70" fill="#0EA5E9"/>
  <text x="250" y="275" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">Q</text>

  <!-- Main Title -->
  <text x="380" y="220" font-family="'Nunito', Arial, sans-serif" font-size="56" font-weight="800" fill="#1E293B">
    QuantumFunZone
  </text>

  <!-- Subtitle -->
  <text x="380" y="280" font-family="'Nunito', Arial, sans-serif" font-size="32" font-weight="600" fill="#475569">
    Quantum Physics for Kids Ages 8-12
  </text>

  <!-- Features -->
  <g transform="translate(380, 320)">
    <!-- Checkmark 1 -->
    <circle cx="0" cy="0" r="12" fill="#10B981"/>
    <path d="M-4 0 L-1 4 L4 -4" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="25" y="7" font-family="'Nunito', Arial, sans-serif" font-size="22" fill="#64748B">Interactive Flashcards</text>

    <!-- Checkmark 2 -->
    <circle cx="0" cy="45" r="12" fill="#10B981"/>
    <path d="M-4 45 L-1 49 L4 41" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="25" y="52" font-family="'Nunito', Arial, sans-serif" font-size="22" fill="#64748B">Animated Videos</text>

    <!-- Checkmark 3 -->
    <circle cx="0" cy="90" r="12" fill="#10B981"/>
    <path d="M-4 90 L-1 94 L4 86" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="25" y="97" font-family="'Nunito', Arial, sans-serif" font-size="22" fill="#64748B">Fun Infographics & More</text>
  </g>

  <!-- Bottom Badge -->
  <rect x="380" y="460" width="180" height="40" rx="20" fill="#F59E0B"/>
  <text x="470" y="487" font-family="'Nunito', Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle">
    FREE Resources
  </text>
</svg>
